# Dexter - Agente de conteudo autonomo do Chattie Blog
#
# Roda automaticamente: seg/qua/sex as 8h BRT (11h UTC)
# Pode ser disparado manualmente via Actions > Run workflow
#
# Secrets necessarios (Settings > Secrets > Actions):
#   ANTHROPIC_API_KEY   - Anthropic API key
#   PEXELS_API_KEY      - Pexels API key
#   BRAVE_API_KEY       - Brave Search API key
#   GSC_KEY_JSON        - JSON de service account em base64
#   NOTIFY_EMAIL        - Email para notificacao pos-publicacao (opcional)
#   MAIL_USERNAME       - Gmail/SMTP username para envio (opcional)
#   MAIL_PASSWORD       - Gmail App Password para envio (opcional)

name: Dexter

on:
  schedule:
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword especifica (vazio = usar backlog)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (gera mas nao commita)'
        required: false
        type: boolean
        default: false

# A4: Apenas uma execucao simultanea por vez
concurrency:
  group: dexter-content-agent
  cancel-in-progress: false

jobs:
  generate-content:
    name: Dexter - Gerar Post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GSC key file
        run: |
          echo "$GSC_KEY_JSON" | base64 -d > /tmp/gsc-key.json
          echo "GSC key file created"
        env:
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}

      - name: Run Dexter
        id: agent
        run: |
          ARGS=""
          if [ -n "$INPUT_KEYWORD" ]; then
            ARGS="--keyword=$INPUT_KEYWORD"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/autonomous-session.mjs $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GSC_KEY_FILE: /tmp/gsc-key.json
          GSC_SITE_URL: https://trychattie.com/
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}

      # A6: Salvar o MDX gerado como artifact (disponivel por 7 dias mesmo se commit falhar)
      - name: Save generated post as artifact
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dexter-post-${{ github.run_number }}
          path: content/blog/
          retention-days: 7
          if-no-files-found: ignore

      - name: Configure git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Dexter"
          git config user.email "dexter@trychattie.com"

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add content/blog/
          git add docs/keyword-backlog.md
          git add docs/gsc-insights.md
          git add docs/agent-session-log.md

          if git diff --staged --quiet; then
            echo "Nada para commitar."
            exit 0
          fi

          TITLE="${{ steps.agent.outputs.title }}"
          if [ -n "$TITLE" ]; then
            MSG="content: $TITLE"
          else
            MSG="content: dexter session $(date +%Y-%m-%d)"
          fi

          git commit -m "$MSG" -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin main
          echo "Push concluido - Vercel deploying..."

      # A5: Notificacao por email apos publicacao bem-sucedida
      - name: Send email notification
        if: ${{ github.event.inputs.dry_run != 'true' && steps.agent.outputs.title != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Dexter <${{ secrets.MAIL_USERNAME }}>
          subject: "Dexter publicou: ${{ steps.agent.outputs.title }}"
          body: |
            O Dexter publicou um novo post no Chattie Blog.

            Titulo: ${{ steps.agent.outputs.title }}
            Slug:   ${{ steps.agent.outputs.slug }}
            URL:    https://trychattie.com/pt-br/blog/${{ steps.agent.outputs.slug }}

            Verifique o post e solicite indexacao no GSC se necessario.

            --
            Dexter - Agente de Conteudo Autonomo do Chattie Blog

      - name: Write job summary
        if: always()
        run: |
          echo "## Dexter" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TITLE="${{ steps.agent.outputs.title }}"
          SLUG="${{ steps.agent.outputs.slug }}"
          if [ -n "$TITLE" ]; then
            echo "Post publicado: $TITLE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Slug: $SLUG" >> $GITHUB_STEP_SUMMARY
            echo "- URL: https://trychattie.com/pt-br/blog/$SLUG" >> $GITHUB_STEP_SUMMARY
            echo "- Artifact: dexter-post-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum post novo criado nesta sessao." >> $GITHUB_STEP_SUMMARY
          fi
