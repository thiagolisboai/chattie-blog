# Chattie Content Agent - Geracao autonoma de posts
#
# Roda automaticamente: seg/qua/sex as 8h BRT (11h UTC)
# Pode ser disparado manualmente via Actions > Run workflow
#
# Secrets necessarios no repositorio (Settings > Secrets > Actions):
#   ANTHROPIC_API_KEY   - Anthropic API key
#   PEXELS_API_KEY      - Pexels API key
#   BRAVE_API_KEY       - Brave Search API key
#   GSC_KEY_JSON        - JSON de service account em base64
#                         Gerar com: base64 -w 0 chattie-blog-tools-XXXXX.json

name: Content Agent

on:
  schedule:
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword especifica (vazio = usar backlog)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (gera mas nao commita)'
        required: false
        type: boolean
        default: false

jobs:
  generate-content:
    name: Generate Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GSC key file
        run: |
          echo "$GSC_KEY_JSON" | base64 -d > /tmp/gsc-key.json
          echo "GSC key file created"
        env:
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}

      - name: Run content agent
        id: agent
        run: |
          ARGS=""
          if [ -n "$INPUT_KEYWORD" ]; then
            ARGS="--keyword=$INPUT_KEYWORD"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/autonomous-session.mjs $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GSC_KEY_FILE: /tmp/gsc-key.json
          GSC_SITE_URL: https://trychattie.com/
          INPUT_KEYWORD: ${{ github.event.inputs.keyword }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: Configure git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Chattie Content Agent"
          git config user.email "content-agent@trychattie.com"

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add content/blog/
          git add docs/keyword-backlog.md
          git add docs/gsc-insights.md
          git add docs/agent-session-log.md

          if git diff --staged --quiet; then
            echo "Nada para commitar."
            exit 0
          fi

          TITLE="${{ steps.agent.outputs.title }}"
          if [ -n "$TITLE" ]; then
            MSG="content: $TITLE"
          else
            MSG="content: autonomous session $(date +%Y-%m-%d)"
          fi

          git commit -m "$MSG

Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"

          git push origin main
          echo "Push concluido - Vercel deploying..."

      - name: Write job summary
        if: always()
        run: |
          echo "## Chattie Content Agent" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TITLE="${{ steps.agent.outputs.title }}"
          SLUG="${{ steps.agent.outputs.slug }}"
          if [ -n "$TITLE" ]; then
            echo "Post publicado: $TITLE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Slug: $SLUG" >> $GITHUB_STEP_SUMMARY
            echo "- URL: https://trychattie.com/pt-br/blog/$SLUG" >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum post novo criado nesta sessao." >> $GITHUB_STEP_SUMMARY
          fi
