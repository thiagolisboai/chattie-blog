# C2: Geracao de Posts EN — Dexter adapta PT-BR com performance validada
#
# Roda automaticamente: toda segunda-feira as 10h BRT (13h UTC)
# Commita diretamente no main e publica via Vercel (modo autonomo total).
#
# Criterios de selecao:
#   - Tier 1: Post PT-BR publicado ha mais de 45 dias + mais de 50 cliques via GSC
#   - Tier 2 (fallback): post mais antigo sem par EN (sem exigir cliques)
#
# Secrets necessarios (mesmos do content-agent):
#   ANTHROPIC_API_KEY, PEXELS_API_KEY, BRAVE_API_KEY, GSC_KEY_JSON

name: Dexter - Gerar Post EN

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug do post PT-BR para adaptar (vazio = auto por GSC)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (gera mas nao salva nem publica)'
        required: false
        type: boolean
        default: false

concurrency:
  group: dexter-translate-post
  cancel-in-progress: false

jobs:
  generate-en:
    name: Dexter - Gerar Post EN
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GSC key file
        run: |
          if [ -n "$GSC_KEY_JSON" ]; then
            echo "$GSC_KEY_JSON" | base64 -d > /tmp/gsc-key.json
            echo "GSC key file created"
          else
            echo '{}' > /tmp/gsc-key.json
            echo "GSC_KEY_JSON not set — GSC clicks check will be skipped (fallback mode active)"
          fi
        env:
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}

      - name: Run EN Generator
        id: generator
        run: |
          ARGS=""
          if [ -n "$INPUT_SLUG" ]; then
            ARGS="--slug=$INPUT_SLUG"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          EXIT_CODE=0
          node scripts/generate-post-en.mjs $ARGS || EXIT_CODE=$?
          # Exit 2 = nenhum candidato elegivel (blog 100% traduzido ou criterio nao atingido)
          # Nao e um erro — resultado valido. Sair com 0 para nao marcar run como falha.
          if [ $EXIT_CODE -eq 2 ]; then
            echo "ℹ️  Dexter EN: nenhum candidato elegivel nesta sessao (exit 2 → success)"
            exit 0
          fi
          exit $EXIT_CODE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GSC_KEY_FILE: /tmp/gsc-key.json
          GSC_SITE_URL: https://trychattie.com/
          INPUT_SLUG: ${{ github.event.inputs.slug }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: Configure git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Dexter"
          git config user.email "dexter@trychattie.com"

      - name: Commit and push to main
        if: ${{ github.event.inputs.dry_run != 'true' && steps.generator.outputs.en_slug != '' }}
        run: |
          EN_SLUG="${{ steps.generator.outputs.en_slug }}"
          PT_SLUG="${{ steps.generator.outputs.pt_slug }}"
          TITLE="${{ steps.generator.outputs.title }}"

          git add content/blog-en/
          git add content/blog/

          if git diff --staged --quiet; then
            echo "Nenhum arquivo novo para commitar."
            exit 0
          fi

          git commit -m "content(en): $TITLE" \
            -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin main
          echo "Push concluido - Vercel deploying..."

      # Health check: verifica se o post EN esta acessivel apos deploy Vercel
      - name: Health check post-deploy
        if: ${{ github.event.inputs.dry_run != 'true' && steps.generator.outputs.en_slug != '' }}
        run: |
          echo "Aguardando deploy Vercel (3 min)..."
          sleep 180
          URL="https://trychattie.com/blog/${{ steps.generator.outputs.en_slug }}"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$URL")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Post EN acessivel: HTTP $STATUS — $URL"
          else
            echo "⚠️ Post EN retornou HTTP $STATUS — $URL"
            echo "   Verifique o deploy no Vercel. O post pode ainda estar sendo buildado."
          fi
        continue-on-error: true

      # Submeter URL EN para indexacao imediata no Google
      - name: Submit EN URL for Google Indexing
        if: ${{ github.event.inputs.dry_run != 'true' && steps.generator.outputs.en_slug != '' }}
        run: node scripts/submit-indexing.mjs --slug=${{ steps.generator.outputs.en_slug }} --lang=en
        env:
          GSC_KEY_FILE: /tmp/gsc-key.json
          GSC_SITE_URL: https://trychattie.com/
        continue-on-error: true

      # IndexNow: notifica Bing/Yandex para o post EN
      - name: Submit EN URL to IndexNow
        if: ${{ github.event.inputs.dry_run != 'true' && steps.generator.outputs.en_slug != '' }}
        run: node scripts/submit-indexnow.mjs --slug=${{ steps.generator.outputs.en_slug }} --lang=en
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          echo "## Dexter - Gerar Post EN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          EN_SLUG="${{ steps.generator.outputs.en_slug }}"
          PT_SLUG="${{ steps.generator.outputs.pt_slug }}"
          if [ -n "$EN_SLUG" ]; then
            echo "Post EN publicado: $EN_SLUG" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- PT-BR: https://trychattie.com/pt-br/blog/$PT_SLUG" >> $GITHUB_STEP_SUMMARY
            echo "- EN: https://trychattie.com/blog/$EN_SLUG" >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum post EN gerado nesta sessao." >> $GITHUB_STEP_SUMMARY
          fi
