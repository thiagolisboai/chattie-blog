# C2: Geracao de Posts EN — Dexter adapta PT-BR com performance validada
#
# Roda automaticamente: toda segunda-feira as 10h BRT (13h UTC)
# Gera um PR (nunca commita direto) — requer revisao humana antes de publicar
#
# Criterios de selecao:
#   - Post PT-BR publicado ha mais de 45 dias
#   - Mais de 50 cliques no periodo via GSC
#   - Sem par EN ja existente
#
# Secrets necessarios (mesmos do content-agent):
#   ANTHROPIC_API_KEY, PEXELS_API_KEY, BRAVE_API_KEY, GSC_KEY_JSON

name: Dexter - Gerar Post EN

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug do post PT-BR para adaptar (vazio = auto por GSC)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (gera mas nao salva)'
        required: false
        type: boolean
        default: false

concurrency:
  group: dexter-translate-post
  cancel-in-progress: false

jobs:
  generate-en:
    name: Dexter - Gerar Post EN
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GSC key file
        run: |
          if [ -n "$GSC_KEY_JSON" ]; then
            echo "$GSC_KEY_JSON" | base64 -d > /tmp/gsc-key.json
            echo "GSC key file created"
          else
            echo '{}' > /tmp/gsc-key.json
            echo "GSC_KEY_JSON not set — GSC clicks check will be skipped (fallback mode active)"
          fi
        env:
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}

      - name: Run EN Generator
        id: generator
        run: |
          ARGS=""
          if [ -n "$INPUT_SLUG" ]; then
            ARGS="--slug=$INPUT_SLUG"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          # set -e é ativo por padrão no GitHub Actions — usar || para capturar exit code
          # sem que o shell termine antes de chegarmos no bloco de mapeamento.
          EXIT_CODE=0
          node scripts/generate-post-en.mjs $ARGS || EXIT_CODE=$?
          # Exit 2 = nenhum candidato elegível (critério não atingido ainda)
          # Não é um erro — é um resultado esperado para blog novo. Marcar como sucesso.
          if [ $EXIT_CODE -eq 2 ]; then
            echo "ℹ️  Dexter EN: nenhum candidato elegível nesta sessão (exit 2 → success)"
            exit 0
          fi
          exit $EXIT_CODE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GSC_KEY_FILE: /tmp/gsc-key.json
          GSC_SITE_URL: https://trychattie.com/
          INPUT_SLUG: ${{ github.event.inputs.slug }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Dexter"
          git config user.email "dexter@trychattie.com"

      - name: Create PR with EN post
        if: ${{ github.event.inputs.dry_run != 'true' && steps.generator.outputs.en_slug != '' }}
        run: |
          EN_SLUG="${{ steps.generator.outputs.en_slug }}"
          PT_SLUG="${{ steps.generator.outputs.pt_slug }}"
          TITLE="${{ steps.generator.outputs.title }}"
          BRANCH="dexter/en-post-${EN_SLUG}-$(date +%Y-%m-%d)-${GITHUB_RUN_NUMBER}"

          git checkout -b "$BRANCH"
          git add content/blog-en/
          git add content/blog/

          if git diff --staged --quiet; then
            echo "Nenhum arquivo novo para commitar."
            exit 0
          fi

          git commit -m "content(en): $TITLE" \
            -m "Adaptacao EN de /pt-br/blog/$PT_SLUG" \
            -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"

          git push origin "$BRANCH"

          # Nota: printf com format string iniciando em '-' causa "invalid option" no Ubuntu.
          # Solução: usar '%s\n' como format e passar o conteúdo como argumento.
          printf '%s\n\n' '## Adaptação EN — Dexter' > /tmp/pr-body.md
          printf '**Post PT-BR:** `/pt-br/blog/%s`\n' "$PT_SLUG" >> /tmp/pr-body.md
          printf '**Post EN gerado:** `/blog/%s`\n' "$EN_SLUG" >> /tmp/pr-body.md
          printf '**URL:** https://trychattie.com/blog/%s\n\n' "$EN_SLUG" >> /tmp/pr-body.md
          printf '%s\n' '### Checklist de revisao' >> /tmp/pr-body.md
          printf '%s\n' '- [ ] Tom ajustado para audience global (nao apenas Brasil)' >> /tmp/pr-body.md
          printf '%s\n' '- [ ] Exemplos brasileiros substituidos por globais' >> /tmp/pr-body.md
          printf '%s\n' '- [ ] Fontes em ingles verificadas' >> /tmp/pr-body.md
          printf '%s\n' "- [ ] slug e canonicalUrl corretos (\`/blog/${EN_SLUG}\`)" >> /tmp/pr-body.md
          printf '%s\n' "- [ ] ptSlug aponta para \`${PT_SLUG}\`" >> /tmp/pr-body.md
          printf '%s\n' '- [ ] FAQ relevante para ICP internacional' >> /tmp/pr-body.md
          printf '%s\n\n' '- [ ] CTA aponta para https://trychattie.com/en' >> /tmp/pr-body.md
          printf '%s\n\n' 'Aprovar este PR publica o post EN automaticamente via Vercel.' >> /tmp/pr-body.md
          printf '%s\n\n' '_Gerado por Dexter - C2 Fase C_' >> /tmp/pr-body.md
          printf '%s\n' 'Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>' >> /tmp/pr-body.md

          gh pr create \
            --title "Dexter (EN): $TITLE" \
            --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # IndexNow: notifica Bing/Yandex para o post EN
      - name: Submit EN URL to IndexNow
        if: ${{ github.event.inputs.dry_run != 'true' && steps.generator.outputs.en_slug != '' }}
        run: node scripts/submit-indexnow.mjs --slug=${{ steps.generator.outputs.en_slug }} --lang=en
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          echo "## Dexter - Gerar Post EN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          EN_SLUG="${{ steps.generator.outputs.en_slug }}"
          PT_SLUG="${{ steps.generator.outputs.pt_slug }}"
          if [ -n "$EN_SLUG" ]; then
            echo "Post EN gerado: $EN_SLUG" >> $GITHUB_STEP_SUMMARY
            echo "- PT-BR: /pt-br/blog/$PT_SLUG" >> $GITHUB_STEP_SUMMARY
            echo "- EN: /blog/$EN_SLUG" >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum post EN gerado nesta sessao." >> $GITHUB_STEP_SUMMARY
          fi
