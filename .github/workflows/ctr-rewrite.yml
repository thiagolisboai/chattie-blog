# CTR Rewrite — reescreve titles e descriptions para melhorar CTR no GSC
#
# Roda automaticamente: dia 1 de cada mês às 9h BRT (12h UTC)
# Pode ser disparado manualmente via Actions > Run workflow
#
# Secrets necessários (mesmos do content-agent):
#   ANTHROPIC_API_KEY  - Anthropic API key (obrigatório)
#   GSC_KEY_JSON       - JSON de service account em base64 (obrigatório)
#
# O script ctr-rewrite.mjs:
#   1. Lê posts do GSC com impressões altas e CTR < 3%
#   2. Reescreve title e description usando Claude, preservando keyword primária
#   3. Modifica os arquivos .mdx diretamente
#   4. Registra o log em docs/ctr-rewrite-log.jsonl

name: CTR Rewrite

on:
  schedule:
    - cron: '0 12 1 * *'   # dia 1 de cada mês às 9h BRT (12h UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — gera rewrites mas não commita'
        required: false
        type: boolean
        default: false
      min_impressions:
        description: 'Mínimo de impressões para considerar um post (padrão: 50)'
        required: false
        type: string
        default: '50'
      max_ctr:
        description: 'CTR máximo para considerar reescrita (padrão: 0.03 = 3%)'
        required: false
        type: string
        default: '0.03'

concurrency:
  group: ctr-rewrite
  cancel-in-progress: false

jobs:
  rewrite:
    name: CTR Rewrite — titles e descriptions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GSC key file
        run: |
          if [ -n "$GSC_KEY_JSON" ]; then
            echo "$GSC_KEY_JSON" | base64 -d > /tmp/gsc-key.json
            echo "GSC key file criado com sucesso"
          else
            echo "ERRO: GSC_KEY_JSON não configurado — CTR rewrite requer acesso ao GSC"
            exit 1
          fi
        env:
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}

      - name: Run CTR rewrite
        id: rewrite
        run: |
          ARGS=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$INPUT_MIN_IMPRESSIONS" ]; then
            ARGS="$ARGS --min-impressions=$INPUT_MIN_IMPRESSIONS"
          fi
          if [ -n "$INPUT_MAX_CTR" ]; then
            ARGS="$ARGS --max-ctr=$INPUT_MAX_CTR"
          fi

          EXIT_CODE=0
          node scripts/ctr-rewrite.mjs $ARGS || EXIT_CODE=$?

          # Exit 2 = nenhum post elegível para reescrita
          if [ $EXIT_CODE -eq 2 ]; then
            echo "ℹ️  CTR Rewrite: nenhum post elegível nesta sessão (exit 2 → success)"
            echo "rewrites=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          exit $EXIT_CODE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_KEY_FILE: /tmp/gsc-key.json
          GSC_SITE_URL: https://trychattie.com/
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_MIN_IMPRESSIONS: ${{ github.event.inputs.min_impressions }}
          INPUT_MAX_CTR: ${{ github.event.inputs.max_ctr }}

      - name: Configure git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Thiago Lisboa"
          git config user.email "dexter@trychattie.com"

      - name: Commit and push CTR changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Staged: todos os MDX modificados + log
          git add content/blog/ content/blog-en/ || true
          [ -f docs/ctr-rewrite-log.jsonl ] && git add docs/ctr-rewrite-log.jsonl || true

          if git diff --staged --quiet; then
            echo "Nenhuma reescrita aplicada — nada para commitar."
            exit 0
          fi

          CHANGED=$(git diff --staged --name-only | grep -c '.mdx' || echo 0)
          git commit -m "seo: CTR rewrite automático — $CHANGED post(s) atualizados" \
            -m "Executado pelo workflow ctr-rewrite.yml em $(date +%Y-%m-%d)" \
            -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin main
          echo "✅ Push concluído — Vercel redeploy em andamento"

      - name: Write job summary
        if: always()
        run: |
          echo "## CTR Rewrite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f docs/ctr-rewrite-log.jsonl ]; then
            COUNT=$(wc -l < docs/ctr-rewrite-log.jsonl)
            echo "Posts reescritos (total acumulado no log): $COUNT" >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhuma reescrita registrada nesta sessão." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Dry run: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
